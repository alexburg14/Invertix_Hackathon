<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>EnerSite — Data-Center Siting</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  :root { --bg:#16181d; --panel:#1f232b; --text:#e8e6e3; --muted:#9a958e; --accent:#ff7a33; }
  * { box-sizing:border-box; }
  body { margin:0; font:14px/1.45 -apple-system, "Segoe UI", sans-serif; background:var(--bg); color:var(--text); display:flex; height:100vh; }
  #sidebar { width:340px; min-width:340px; overflow-y:auto; background:var(--panel); padding:16px; display:flex; flex-direction:column; gap:14px; }
  #map { flex:1; background:#101216; }
  h1 { font-size:18px; margin:0; } h1 span { color:var(--accent); }
  .sub { color:var(--muted); font-size:12px; margin-top:2px; }
  label { display:flex; justify-content:space-between; font-size:12px; color:var(--muted); margin-bottom:2px; }
  input[type=range] { width:100%; accent-color:var(--accent); }
  .mw input { width:100%; padding:7px 10px; font-size:15px; border-radius:6px; border:1px solid #3a3f4a; background:var(--bg); color:var(--text); }
  .stat { font-size:12px; color:var(--muted); }
  .stat b { color:var(--text); }
  ol { margin:0; padding:0; list-style:none; }
  ol li { padding:8px 10px; border-radius:6px; cursor:pointer; display:flex; justify-content:space-between; gap:6px; }
  ol li:hover, ol li.active { background:#2a2f3a; }
  ol li .rank { color:var(--accent); font-weight:600; min-width:22px; }
  ol li .score { color:var(--muted); }
  #detail { background:var(--bg); border:1px solid #3a3f4a; border-radius:8px; padding:12px; font-size:13px; display:none; }
  #detail h3 { margin:0 0 6px; font-size:14px; }
  #detail table { width:100%; border-collapse:collapse; }
  #detail td { padding:2px 0; } #detail td:last-child { text-align:right; }
  #detail .verdict { margin-top:8px; color:var(--muted); font-style:italic; }
  .bar { height:4px; border-radius:2px; background:#3a3f4a; margin-top:1px; }
  .bar i { display:block; height:100%; border-radius:2px; background:var(--accent); }
</style>
</head>
<body>
<div id="sidebar">
  <div>
    <h1>Ener<span>Site</span></h1>
    <div class="sub">Where to build a data center, and how to power it</div>
  </div>

  <div class="mw">
    <label>Data-center size (MW IT load)</label>
    <input id="mw" type="number" value="100" min="5" max="1000" step="5">
  </div>

  <div id="weights"></div>

  <div class="stat" id="counts"></div>
  <ol id="ranking"></ol>
  <div id="detail"></div>
</div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// Of a bus's total connected line rating, assume at most this share is
// realistically available to a new load (rest carries existing flows).
const AVAILABLE_SHARE = 0.2;
const PUE = 1.2; // IEA-typical for new builds: grid draw = IT load * PUE

const WEIGHTS = [
  { key: "cost",    label: "Cheap power",        w: 0.30, s: p => p.s_price_eur_mwh },
  { key: "carbon",  label: "Clean power",        w: 0.30, s: p => (p.s_gco2_kwh + p.s_clean_share_pct) / 2 },
  { key: "connect", label: "Connectivity",       w: 0.20, s: p => p.s_dist_dc_km },
  { key: "ppa",     label: "PPA potential",      w: 0.20, s: p => p.s_ppa_mw_50km },
];

const map = L.map("map", { preferCanvas: true }).setView([54, 10], 5);
L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",
  { attribution: "&copy; OSM &copy; CARTO", maxZoom: 18 }).addTo(map);

let sites = [], markers = new Map(), activeId = null;

const $ = id => document.getElementById(id);
const color = s => s > .8 ? "#3ddc84" : s > .6 ? "#b8d433" : s > .4 ? "#ffb020" : s > .2 ? "#ff7a33" : "#e0455a";

// weight sliders
$("weights").innerHTML = WEIGHTS.map(w => `
  <label>${w.label}<span id="wv_${w.key}"></span></label>
  <input type="range" id="w_${w.key}" min="0" max="100" value="${w.w * 100}">`).join("");
WEIGHTS.forEach(w => $("w_" + w.key).oninput = render);
$("mw").oninput = render;

fetch("sites.geojson").then(r => r.json()).then(g => {
  sites = g.features.map(f => ({
    p: f.properties, lat: f.geometry.coordinates[1], lon: f.geometry.coordinates[0],
  }));
  sites.forEach(s => {
    s.marker = L.circleMarker([s.lat, s.lon], { radius: 4, weight: 0, fillOpacity: .8 })
      .on("click", () => select(s)).addTo(map);
  });
  render();
});

function score(s, ws) {
  return WEIGHTS.reduce((t, w, i) => t + ws[i] * w.s(s.p), 0);
}

function render() {
  const mw = +$("mw").value || 0;
  const need = mw * PUE / AVAILABLE_SHARE; // MVA of connected rating required
  let ws = WEIGHTS.map(w => +$("w_" + w.key).value);
  const tot = ws.reduce((a, b) => a + b, 0) || 1;
  ws = ws.map(v => v / tot);
  WEIGHTS.forEach((w, i) => $("wv_" + w.key).textContent = Math.round(ws[i] * 100) + "%");

  let feasible = 0;
  sites.forEach(s => {
    s.ok = s.p.headroom_mva >= need;
    s.score = s.ok ? score(s, ws) : 0;
    feasible += s.ok;
    s.marker.setStyle(s.ok
      ? { fillColor: color(s.score), fillOpacity: .85, radius: 4.5 }
      : { fillColor: "#3a3f4a", fillOpacity: .25, radius: 2.5 });
  });

  $("counts").innerHTML = `<b>${feasible.toLocaleString()}</b> of ${sites.length.toLocaleString()} grid nodes can host
    <b>${mw} MW</b> (needs ≥ ${Math.round(need).toLocaleString()} MVA connected @ ${AVAILABLE_SHARE * 100}% available, PUE ${PUE})`;

  const top = sites.filter(s => s.ok).sort((a, b) => b.score - a.score).slice(0, 10);
  $("ranking").innerHTML = top.map((s, i) => `
    <li data-id="${s.p.bus_id}">
      <span class="rank">${i + 1}</span>
      <span style="flex:1">${s.p.country} · ${s.p.voltage} kV ${s.p.nearest_dc ? "· near " + esc(s.p.nearest_dc) : ""}</span>
      <span class="score">${(s.score * 100).toFixed(0)}</span>
    </li>`).join("");
  [...$("ranking").children].forEach((li, i) => li.onclick = () => { select(top[i]); map.flyTo([top[i].lat, top[i].lon], 8); });
  if (activeId) { const s = sites.find(x => x.p.bus_id === activeId); if (s) detail(s); }
}

function select(s) { activeId = s.p.bus_id; detail(s); }

function pct(v) { return Math.round(v * 100); }
function esc(t) { return String(t).replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c])); }

function detail(s) {
  const p = s.p, d = $("detail");
  const rows = [
    ["Grid headroom", `${(+p.headroom_mva).toLocaleString()} MVA · ${p.n_lines} lines`],
    ["Wholesale price", `€${p.price_eur_mwh}/MWh`, p.s_price_eur_mwh],
    ["Carbon intensity", `${p.gco2_kwh} gCO₂/kWh · ${p.clean_share_pct}% clean`, p.s_gco2_kwh],
    ["Nearest data center", `${p.dist_dc_km} km${p.nearest_dc ? " (" + esc(p.nearest_dc) + ")" : ""}`, p.s_dist_dc_km],
    ["Wind+solar in 50 km", `${(+p.ppa_mw_50km).toLocaleString()} MW · ${p.ppa_plants_50km} plants`, p.s_ppa_mw_50km],
  ];
  const good = rows.filter(r => r[2] > .7).map(r => r[0].toLowerCase());
  const bad = rows.filter(r => r[2] !== undefined && r[2] < .3).map(r => r[0].toLowerCase());
  d.style.display = "block";
  d.innerHTML = `<h3>${p.country} · ${p.voltage} kV node</h3>
    <table>${rows.map(r => `<tr><td>${r[0]}</td><td>${r[1]}</td></tr>
      ${r[2] !== undefined ? `<tr><td colspan=2><div class="bar"><i style="width:${pct(r[2])}%"></i></div></td></tr>` : ""}`).join("")}
    </table>
    <div class="verdict">${
      (good.length ? "Strong on " + good.join(", ") : "No standout strengths") +
      (bad.length ? "; weak on " + bad.join(", ") : "") + "."
    } Scores are percentiles vs. all European grid nodes.</div>`;
}
</script>
</body>
</html>
