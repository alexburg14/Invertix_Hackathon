<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>DeepSite — Underwater Data-Center Siting</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  :root { --bg:#0e141d; --panel:#16202e; --text:#e8e6e3; --muted:#8fa0b5; --accent:#33c6ff; }
  * { box-sizing:border-box; }
  body { margin:0; font:14px/1.45 -apple-system, "Segoe UI", sans-serif; background:var(--bg); color:var(--text); display:flex; height:100vh; }
  #sidebar  { width:300px; min-width:300px; overflow-y:auto; background:var(--panel); padding:14px; display:flex; flex-direction:column; gap:10px; border-right:1px solid #1e2d3e; }
  #rightbar { width:300px; min-width:300px; overflow-y:auto; background:var(--panel); padding:14px; display:flex; flex-direction:column; gap:10px; border-left:1px solid #1e2d3e; }
  #map { flex:1; background:#0a0f16; }
  .card { background:var(--bg); border:1px solid #1e2d3e; border-radius:10px; padding:12px 14px; }
  .card-title { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.07em; color:var(--muted); margin-bottom:10px; }
  h1 { font-size:18px; margin:0; } h1 span { color:var(--accent); }
  .sub { color:var(--muted); font-size:12px; margin-top:2px; }
  label { display:flex; justify-content:space-between; font-size:12px; color:var(--muted); margin-bottom:2px; }
  input[type=range] { width:100%; accent-color:var(--accent); }
  .mw-input { width:100%; padding:7px 10px; font-size:15px; border-radius:6px; border:1px solid #2e3d52; background:#0e141d; color:var(--text); }
  .stat { font-size:12px; color:var(--muted); }
  .stat b { color:var(--text); }
  ol { margin:0; padding:0; list-style:none; }
  ol li { padding:7px 8px; border-radius:6px; cursor:pointer; display:flex; justify-content:space-between; gap:6px; font-size:13px; }
  ol li:hover, ol li.active { background:#1a2740; }
  ol li .rank { color:var(--accent); font-weight:600; min-width:20px; }
  ol li .score { color:var(--muted); font-size:12px; }
  #detail { font-size:13px; display:none; }
  #detail h3 { margin:0 0 8px; font-size:14px; }
  #detail table { width:100%; border-collapse:collapse; }
  #detail td { padding:2px 0; } #detail td:last-child { text-align:right; color:var(--text); }
  #detail .verdict { margin-top:8px; color:var(--muted); font-style:italic; font-size:12px; }
  .bar { height:4px; border-radius:2px; background:#2e3d52; margin-top:1px; margin-bottom:3px; }
  .bar i { display:block; height:100%; border-radius:2px; background:var(--accent); }
  .impact { margin-top:10px; padding-top:10px; border-top:1px solid #1e2d3e; display:flex; flex-direction:column; gap:5px; }
  .impact div { display:flex; justify-content:space-between; font-size:12px; }
  .impact b { color:var(--accent); }
  .save { color:#3ddc84 !important; }
</style>
</head>
<body>
<div id="sidebar">
  <div class="card">
    <h1>Deep<span>Site</span></h1>
    <div class="sub">Where to sink a data center, and how to power it</div>
  </div>

  <div class="card">
    <div class="card-title">What matters most to you?</div>
    <div id="weights"></div>
  </div>

  <div class="card stat" id="counts"></div>
</div>
<div id="map"></div>
<div id="rightbar">
  <div class="card">
    <div class="card-title">Top sites</div>
    <ol id="ranking"></ol>
  </div>
  <div class="card" id="detail"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// Ten siting factors for an offshore-wind-paired subsea pod. Each carries its
// precomputed percentile score (s_*, 1 = best) plus the raw field/unit/format
// and a plain-language pro/con for the explain panel.
const WEIGHTS = [
  { key: "capacity", label: "Wind-farm capacity",    w: .5, s: p => p.s_capacity, raw: ["wf_power_mw"],      unit: "MW",  fmt: 0,   good: "large clean-power supply",  bad: "small wind farm" },
  { key: "bottemp",  label: "Bottom-water temp",     w: .5, s: p => p.s_bottemp,  raw: ["bot_temp_c"],        unit: "°C",  fmt: 1,   good: "cold seabed, free cooling", bad: "warm seabed, cooling load" },
  { key: "windpark", label: "Distance to wind farm", w: .5, s: p => p.s_windpark, raw: ["dist_windpark_km"],  unit: "km",  fmt: 0,   good: "clustered, redundant power", bad: "isolated farm" },
  { key: "shore",    label: "Distance to shore",     w: .5, s: p => p.s_shore,    raw: ["dist_shore_km"],     unit: "km",  fmt: 0,   good: "close to cable landing",    bad: "far from shore" },
  { key: "depth",    label: "Depth",                 w: .5, s: p => p.s_depth,    raw: ["depth_m"],           unit: "m",   fmt: 0,   good: "ideal deployment depth",    bad: "too shallow / too deep" },
  { key: "negprice", label: "Negative-price hours",  w: .5, s: p => p.s_negprice, raw: ["negprice_pct"],      unit: "%",   fmt: 1,   good: "frequent free surplus power", bad: "rarely negative prices" },
  { key: "wind",     label: "Wind speed",            w: .5, s: p => p.s_wind,     raw: ["wind_ms"],           unit: "m/s", fmt: 1,   good: "strong, steady wind",       bad: "weak wind resource" },
  { key: "current",  label: "Sea current",           w: .5, s: p => p.s_current,  raw: ["current_ms"],        unit: "m/s", fmt: 2,   good: "ideal flow for cooling",    bad: "too calm or too strong" },
  { key: "slope",    label: "Seabed slope",          w: .5, s: p => p.s_slope,    raw: ["slope_deg"],         unit: "°",   fmt: 1,   good: "flat, stable seabed",       bad: "steep seabed" },
  { key: "mpa",      label: "Protected area",        w: .5, s: p => p.s_mpa,      raw: ["mpa_status"],        unit: "",    fmt: "t", good: "outside protected area",    bad: "inside protected area" },
];

const map = L.map("map", { preferCanvas: true }).setView([56, 5], 6);
L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",
  { attribution: "&copy; OSM &copy; CARTO &copy; TeleGeography", maxZoom: 18 }).addTo(map);

let sites = [], activeId = null;

const $ = id => document.getElementById(id);

// weight sliders
$("weights").innerHTML = WEIGHTS.map(w => `
  <label>${w.label}<span id="wv_${w.key}"></span></label>
  <input type="range" id="w_${w.key}" min="0" max="100" value="${w.w * 100}">`).join("");
WEIGHTS.forEach(w => $("w_" + w.key).oninput = render);

// submarine fiber cables as a faint overlay (TeleGeography, Europe-cropped)
fetch("cables.json").then(r => r.json()).then(g =>
  L.geoJSON(g, { style: f => ({ color: f.properties.color || "#888", weight: 1, opacity: .45 }) })
    .addTo(map));

// Smoothed score surface: sites form a regular 0.1° grid, so rasterize them
// into an ImageData (rows spaced in Mercator-y so the overlay aligns), upscale
// with canvas smoothing, and stretch over the bbox as one image overlay.
const BBOX = { lat0: 35, lon0: -11, lat1: 72, lon1: 32 };
// W/H ≈ one pixel per 0.05° cell; painted at this resolution, CSS smooths on zoom
const STEP = 0.05;
const W = 860, H = 1080;
const mercY = lat => Math.log(Math.tan(Math.PI / 4 + lat * Math.PI / 360));
const cellKey = (lat, lon) => Math.round(lat / STEP) + "_" + Math.round(lon / STEP);
// Continuous score → RGBA (avoids hard color-band edges)
function scoreColor(score, out, o) {
  // stops: [threshold, r, g, b]
  const S = score;
  let r, g, b;
  if      (S >= 0.8) { r=61;  g=220; b=132; }
  else if (S >= 0.6) { const t=(S-.6)/.2; r=61+t*(184-61)|0;  g=220+(t*(212-220))|0; b=132+(t*(51-132))|0; }
  else if (S >= 0.4) { const t=(S-.4)/.2; r=184+t*(255-184)|0; g=212+(t*(176-212))|0; b=51+(t*(32-51))|0; }
  else if (S >= 0.2) { const t=(S-.2)/.2; r=255;               g=176+(t*(122-176))|0; b=32+(t*(51-32))|0; }
  else               { const t=S/.2;       r=224+t*(255-224)|0; g=69+(t*(122-69))|0;  b=90+(t*(51-90))|0; }
  out[o]=r; out[o+1]=g; out[o+2]=b; out[o+3]=190;
}

let cells = new Map(), pixIdx = null, overlay = null;
const cnv = document.createElement("canvas"); cnv.width = W; cnv.height = H;
const hl = L.circleMarker([0, 0], { radius: 7, color: "#fff", weight: 2, fillOpacity: 0 });

fetch("seafloor.geojson").then(r => r.json()).then(g => {
  sites = g.features.map((f, i) => ({
    id: i, p: f.properties, lat: f.geometry.coordinates[1], lon: f.geometry.coordinates[0],
  }));
  sites.forEach(s => cells.set(cellKey(s.lat, s.lon), s));

  // per-pixel site index, computed once
  pixIdx = new Int32Array(W * H).fill(-1);
  const top = mercY(BBOX.lat1), bot = mercY(BBOX.lat0);
  for (let y = 0; y < H; y++) {
    const m = top + (bot - top) * (y + .5) / H;
    const lat = (2 * Math.atan(Math.exp(m)) - Math.PI / 2) * 180 / Math.PI;
    for (let x = 0; x < W; x++) {
      const s = cells.get(cellKey(lat, BBOX.lon0 + (x + .5) * (BBOX.lon1 - BBOX.lon0) / W));
      if (s) pixIdx[y * W + x] = s.id;
    }
  }
  overlay = L.imageOverlay(cnv.toDataURL(),
    [[BBOX.lat0, BBOX.lon0], [BBOX.lat1, BBOX.lon1]], { interactive: false }).addTo(map);
  render();
});

// click anywhere -> nearest grid cell (search the 5x5 cell neighborhood)
map.on("click", e => {
  let best = null, bd = Infinity;
  const iy = Math.round(e.latlng.lat / STEP), ix = Math.round(e.latlng.lng / STEP);
  for (let dy = -2; dy <= 2; dy++) for (let dx = -2; dx <= 2; dx++) {
    const s = cells.get((iy + dy) + "_" + (ix + dx));
    if (!s) continue;
    const d = (s.lat - e.latlng.lat) ** 2 + (s.lon - e.latlng.lng) ** 2;
    if (d < bd) { bd = d; best = s; }
  }
  if (best) select(best);
});

function paint() {
  if (!pixIdx || !overlay) return;
  const ctx = cnv.getContext("2d");
  const img = ctx.createImageData(W, H);
  const d = img.data;
  for (let k = 0; k < pixIdx.length; k++) {
    const i = pixIdx[k];
    if (i < 0) continue;
    const s = sites[i], o = k * 4;
    if (s.ok) scoreColor(s.score, d, o);
    else { d[o]=46; d[o+1]=61; d[o+2]=82; d[o+3]=70; }
  }
  ctx.putImageData(img, 0, 0);
  overlay.setUrl(cnv.toDataURL());
  // CSS bilinear smoothing — applied once after overlay element exists
  const el = overlay.getElement();
  if (el) el.style.imageRendering = "auto";
}

function score(s, ws) {
  return WEIGHTS.reduce((t, w, i) => t + ws[i] * w.s(s.p), 0);
}

function render() {
  let ws = WEIGHTS.map(w => +$("w_" + w.key).value);
  const tot = ws.reduce((a, b) => a + b, 0) || 1;
  ws = ws.map(v => v / tot);
  WEIGHTS.forEach((w, i) => $("wv_" + w.key).textContent = Math.round(ws[i] * 100) + "%");

  sites.forEach(s => { s.ok = true; s.score = score(s, ws); });
  paint();

  $("counts").innerHTML = `<b>${sites.length.toLocaleString()}</b> seafloor cells scored
    across the European shelf (0.05° grid), ranked by your weighting.`;

  const top = sites.slice().sort((a, b) => b.score - a.score).slice(0, 10);
  $("ranking").innerHTML = top.map((s, i) => `
    <li>
      <span class="rank">${i + 1}</span>
      <span style="flex:1">${s.p.depth_m} m · ${s.p.wf_name ? esc(s.p.wf_name) : esc(s.p.mpa_status || "open water")}</span>
      <span class="score">${(s.score * 100).toFixed(0)}</span>
    </li>`).join("");
  [...$("ranking").children].forEach((li, i) => li.onclick = () => { select(top[i]); map.flyTo([top[i].lat, top[i].lon], 8); });
  if (activeId !== null) { const s = sites[activeId]; if (s) detail(s); }
}

function select(s) {
  activeId = s.id;
  hl.setLatLng([s.lat, s.lon]).addTo(map);
  detail(s);
}

function pct(v) { return Math.round(v * 100); }
function esc(t) { return String(t).replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c])); }

function fmtRaw(v, f) {
  if (v === undefined || v === null) return "?";
  if (f === "t") return esc(String(v));
  if (typeof v !== "number") return esc(String(v));
  return v.toFixed(f);
}

function detail(s) {
  const p = s.p, d = $("detail");
  // one row per factor: label, raw value + unit, percentile score
  const rows = WEIGHTS.map(w => {
    const rv = w.raw.map(k => p[k]).find(v => v !== undefined && v !== null);
    return [w.label, fmtRaw(rv, w.fmt) + (w.unit ? " " + w.unit : ""), w.s(p)];
  });
  const good = WEIGHTS.filter(w => w.s(p) >= .7).map(w => w.good);
  const bad = WEIGHTS.filter(w => w.s(p) <= .3).map(w => w.bad);
  const place = p.wf_name ? esc(p.wf_name) : esc(p.mpa_status || "open water");

  d.style.display = "flex";
  d.style.flexDirection = "column";
  d.innerHTML = `<h3>${p.depth_m} m seafloor · ${place}</h3>
    <table>${rows.map(r => `<tr><td>${r[0]}</td><td>${r[1]}</td></tr>
      ${r[2] !== undefined ? `<tr><td colspan=2><div class="bar"><i style="width:${pct(r[2])}%"></i></div></td></tr>` : ""}`).join("")}
    </table>
    <div class="verdict">${
      (good.length ? "Strong on " + good.join(", ") : "No standout strengths") +
      (bad.length ? "; weak on " + bad.join(", ") : "") + "."
    } Scores are percentiles vs. all European shelf cells.</div>`;
}
</script>
</body>
</html>
